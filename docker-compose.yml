version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: rmparking-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-rmparking}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rmparking-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: rmparking-adminer
    restart: always
    ports:
      - "8080:8080"
    environment:
      ADMINER_DESIGN: ${ADMINER_DESIGN:-pepa-linha}
    networks:
      - rmparking-net
    depends_on:
      - db

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: rmparking-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      # ES: Secreto JWT obligatorio. Si no se define, se usará un valor por defecto seguro.
      - JWT_SECRET=${JWT_SECRET:-rm_parking_jwt_secret_2024_secure_random_key_64_chars_min}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-no-reply@rmparking.com}
      - PASSWORD_RESET_DELIVERY_OVERRIDE=${PASSWORD_RESET_DELIVERY_OVERRIDE:-}
      - DB_HOST=db
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-rmparking}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-rmparking}
    networks:
      - rmparking-net
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/docs" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./Backend/src:/app/src
      - ./Backend/prisma:/app/prisma

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: rmparking-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:3000}
      - CHOKIDAR_USEPOLLING=1
      - WATCHPACK_POLLING=true
    networks:
      - rmparking-net
    volumes:
      - ./Frontend/src:/app/src
      - ./Frontend/public:/app/public

volumes:
  postgres_data:


networks:
  rmparking-net:
    driver: bridge
